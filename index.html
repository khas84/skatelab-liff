<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkateLab 予約システム</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        #status { margin-top: 20px; padding: 10px; border-radius: 5px; }
        .loading { background-color: #fff3cd; color: #856404; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h2>SkateLab 予約システム</h2>
    <div id="status" class="loading">LIFFシステムを初期化中...</div>
    <div id="profile" style="display: none; margin-top: 20px;">
        <p>ようこそ、<span id="displayName" style="font-weight: bold;"></span> 様</p>
    </div>

    <script>
        // プロデューサー指定のLIFF ID
        const LIFF_ID = "2009436433-Nh9ImTsd"; 
        
        // ★後ほどGASをデプロイし直した際の新しいWebアプリURLをここに設定します
        const GAS_API_URL = "YOUR_GAS_WEB_APP_URL_HERE"; 

        document.addEventListener("DOMContentLoaded", function() {
            initializeLiff();
        });

        async function initializeLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                const profile = await liff.getProfile();
                document.getElementById('displayName').innerText = profile.displayName;
                document.getElementById('profile').style.display = 'block';
                
                updateStatus('LIFF初期化完了。サーバーと通信中...', 'loading');
                
                // GASへデータを送信
                await sendDataToGas(profile);

            } catch (error) {
                console.error("LIFF Init Error:", error);
                updateStatus('エラー: ' + error.message, 'error');
            }
        }

        async function sendDataToGas(profile) {
            const payload = {
                action: "init_check",
                userId: profile.userId,
                displayName: profile.displayName
            };

            try {
                // GASのCORSプレフライトを回避するため text/plain で送信
                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain', 
                    },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                
                if(result.status === "success") {
                    updateStatus('システム接続完了！', 'success');
                } else {
                    updateStatus('サーバーエラー: ' + result.message, 'error');
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                updateStatus('通信エラー: GASとの接続に失敗しました。', 'error');
            }
        }

        function updateStatus(message, className) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = message;
            statusDiv.className = className;
        }
    </script>
</body>
</html>
